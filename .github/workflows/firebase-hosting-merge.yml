name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout code
      - uses: actions/checkout@v4

      # Install dependencies in the frontend folder (adjust if your folder is different)
      - name: Install dependencies
        run: npm install
        working-directory: Frontend

      # Build the project
      - name: Build project
        run: npm run build
        working-directory: Frontend

      # Deploy to Firebase Hosting
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TASKMANAGERTEJANARRA }}
          channelId: live
          projectId: taskmanagertejanarra
